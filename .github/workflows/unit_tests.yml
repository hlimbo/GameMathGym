name: Run Unit Tests

on:
  # deploy manually
  workflow_dispatch:
  # deploy when code is pushed to main branch
  push:
    branch: main

jobs:
  run-unit-tests-desktop:
    runs-on: ubuntu-24.04
    env:
      # set this flag to true when locally testing a dry-run of this github action workflow using nektos/act only
      ACT: false
      # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2404-Readme.md#environment-variables
      VCPKG_INSTALLATION_ROOT: "/usr/local/share/vcpkg"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      
      - name: Install CMake 4 from Official GitHub Release
        run: |
          # 1. Define the exact CMake 4 version
          CMAKE_VERSION="4.2.0"

          # 2. Download the official pre-compiled x86_64 tarball from Kitware's GitHub
          echo "Downloading CMake $CMAKE_VERSION..."
          wget -q https://github.com/Kitware/CMake/releases/download/v${CMAKE_VERSION}/cmake-${CMAKE_VERSION}-linux-x86_64.tar.gz

          # 3. Extract directly into /usr/local (overwriting default APT binaries cleanly)
          sudo tar -xzf cmake-${CMAKE_VERSION}-linux-x86_64.tar.gz -C /usr/local --strip-components=1

          # 4. Clean up downloaded tarball & verify
          rm cmake-${CMAKE_VERSION}-linux-x86_64.tar.gz
          cmake --version
        
      - name: Install Linux Build Prereqs
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ninja-build
          cmake --version
          ninja --version

      - name: Install vcpkg
        env:
          COMMIT_SHA: "4b77da7fed37817f124936239197833469f1b9a8"
        if: ${{ env.ACT == 'true' }}
        run: |
          sudo apt-get install -y git curl zip unzip tar
          sudo git clone https://github.com/microsoft/vcpkg.git /opt/vcpkg
          sudo git -C /opt/vcpkg checkout ${COMMIT_SHA}
          sudo /opt/vcpkg/bootstrap-vcpkg.sh
          sudo chmod -R 777 /opt/vcpkg

      - name: Set VCPKG_INSTALLATION_ROOT for running github actions locally via nektos/act
        if: ${{ env.ACT == 'true' }}
        run: |
          if [ -d "/opt/vcpkg" ]; then
            echo "VCPKG_INSTALLATION_ROOT=/opt/vcpkg" >> $GITHUB_ENV
            echo "VCPKG overwrite for nektos/act local run succeeded"
          else
            echo "VCPKG overwrite for nektos/act local run failed"
          fi

      - name: Configure CMake
        env:
          # remap vcpkg root directory as github actions runner has it installed in a different environment variable: https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2404-Readme.md#environment-variables
          VCPKG_ROOT: ${{ env.VCPKG_INSTALLATION_ROOT }}
        run: |
          echo "VCPKG ROOT? ${VCPKG_ROOT}"
          echo "VCPKG_INSTALLATION_ROOT? ${VCPKG_INSTALLATION_ROOT}"
          cmake --preset github-actions-ubuntu
      
      - name: CMake build
        run: cmake --build --preset github-actions-ubuntu-build
      
      - name: Run Unit Tests
        run: ctest --preset unit-tests-github-actions



    
