name: Run Unit Tests

on:
  # deploy manually
  workflow_dispatch:
  # deploy when code is pushed to main branch
  push:
    branch: main

jobs:
  run-unit-tests-desktop:
    runs-on: ubuntu-24.04
    env:
      # set this flag to true when locally testing a dry-run of this github action workflow using nektos/act only
      ACT: false
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      
      - name: Remove CMake 3
        run: |
          if dpkg -l | grep -q "^ii cmake"; then
            echo "Found Old Version of CMake Installed via APT. Uninstalling..."
            sudo apt-get purge --autoremove -y cmake
          fi

      - name: Install CMake 4 by Adding Kitware's GPG sign key and Adding Kitware APT repo for Ubuntu 24.04
        run: |
          sudo apt install -y ca-certificates gpg wget
          wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null | gpg --dearmor - | sudo tee /usr/share/keyrings/kitware-archive-keyring.gpg >/dev/null
          echo 'deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ noble main' | sudo tee /etc/apt/sources.list.d/kitware.list >/dev/null

      - name: Install Linux Build Prereqs
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build
          cmake --version

      - name: Install vcpkg
        env:
          COMMIT_SHA: "4b77da7fed37817f124936239197833469f1b9a8"
        if: ${{ env.ACT == 'true' }}
        run: |
          sudo apt-get install -y git curl zip unzip tar
          sudo git clone https://github.com/microsoft/vcpkg.git /opt/vcpkg
          sudo git -C /opt/vcpkg checkout ${COMMIT_SHA}
          sudo /opt/vcpkg/bootstrap-vcpkg.sh
          sudo chmod -R 777 /opt/vcpkg

      - name: Set VCPKG_INSTALLATION_ROOT for running github actions locally via nektos/act
        if: ${{ env.ACT == 'true' }}
        run: |
          if [ -d "/opt/vcpkg" ]; then
            echo "VCPKG_INSTALLATION_ROOT=/opt/vcpkg" >> $GITHUB_ENV
            echo "VCPKG overwrite for nektos/act local run succeeded"
          else
            echo "VCPKG overwrite for nektos/act local run failed"
          fi

      - name: Configure CMake
        env:
          # remap vcpkg root directory as github actions runner has it installed in a different environment variable: https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2404-Readme.md#environment-variables
          VCPKG_ROOT: ${{ env.VCPKG_INSTALLATION_ROOT }}
        run: cmake --preset github-actions-ubuntu
      
      - name: CMake build
        run: cmake --build --preset github-actions-ubuntu-build
      
      - name: Run Unit Tests
        run: ctest --preset unit-tests-github-actions



    
